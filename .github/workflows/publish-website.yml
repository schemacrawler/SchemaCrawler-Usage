name: Build and Publish Website

on:
  workflow_dispatch:
  push:
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Website
    runs-on: ubuntu-latest
    steps:

# VALIDATE TAGS
    - id: validate-semver
      name: Validate tag against semantic versioning
      if: startsWith(github.ref, 'refs/tags/')
      shell: bash
      run: |
        SEMVER_PATTERN="^refs/tags/v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-[0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*)?(\+[0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*)?$"
        if [[ ! $GITHUB_REF =~ $SEMVER_PATTERN ]]
          then
            echo "Tag $GITHUB_REF does not follow semantic versioning"
            exit 1
          fi

# SETUP BUILD ENVIRONMENT
    - id: prepare-maven-build
      name: Prepare Maven build
      uses: sualeh/prepare-maven-build@v1.7.2
      with:
        java-version: 17
    - id: install-graphviz
      name: Install Graphviz
      uses: sualeh/install-graphviz@v1.0.3

# BUILD WEBSITE
    - id: build
      name: Build website
      shell: bash
      run: |
        # Build website
        mvn \
          --no-transfer-progress \
          --batch-mode \
          clean test

# CHECK LINKS
    - id: check-links
      name: Check links in generated website
      shell: bash
      run: |
        python .github/scripts/check_links.py \
          --html \
          --root ./schemacrawler-website/target/_website \
          --report /tmp/link-report.md \
          --no-external || true
        cat /tmp/link-report.md >> "$GITHUB_STEP_SUMMARY"

# UPLOAD WEBSITE (only on tags or manual dispatch)
    - id: configure-pages
      name: Setup Pages
      if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
      uses: actions/configure-pages@v6

    - id: upload-artifact
      name: Upload artifact
      if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
      uses: actions/upload-pages-artifact@v5
      with:
        path: ./schemacrawler-website/target/_website


  deploy:
    name: Deploy Website
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    environment:
      name: github-pages
      url: ${{ steps.deploy-pages.outputs.page_url }}
    needs: build

    steps:

    - id: deploy-pages
      name: Deploy to GitHub Pages
      uses: actions/deploy-pages@v5

